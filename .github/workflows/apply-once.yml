name: Apply verified source package once

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'automation/rebuild-exact'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Checkout Site 1 brand assets
        uses: actions/checkout@v4
        with:
          repository: Satte882/DPPFOR-Astro-Site
          path: brand-source

      - name: Stage verified final source
        shell: bash
        run: |
          set -euo pipefail
          FINAL_STAGE="${RUNNER_TEMP}/final-site-${GITHUB_RUN_ID}"
          BRAND_STAGE="${RUNNER_TEMP}/brand-source-${GITHUB_RUN_ID}"
          mkdir -p "${FINAL_STAGE}/public/images"
          tar -xzf artifacts/final-site.tar.gz -C "${FINAL_STAGE}"
          cp brand-source/public/images/logo.png "${FINAL_STAGE}/public/images/logo.png"
          cp brand-source/public/favicon.png "${FINAL_STAGE}/public/favicon.png"
          mv brand-source "${BRAND_STAGE}"
          rsync -a --delete --exclude='.git' --exclude='.github' "${FINAL_STAGE}/" ./

      - name: Commit final website to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize website combination with original flow and brand assets"
          git push origin main
