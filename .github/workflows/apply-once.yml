name: Apply verified artifact once

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download fixed verified artifact
        uses: actions/download-artifact@v4
        with:
          name: verified-website-combination
          path: verified
          run-id: 27471183118
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace repository with verified source
        shell: bash
        run: |
          set -euo pipefail
          rsync -a --delete --exclude='.git' --exclude='.github' verified/ ./
          rm -rf merge .github/workflows
          mkdir -p .github/workflows
          cat > .github/workflows/verify.yml <<'YAML'
          name: Verify website

          on:
            push:
              branches: [main]
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            verify:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22
                    cache: npm
                - run: npm ci
                - run: npm run lint
                - run: npm run build
          YAML

      - name: Commit final website
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize website combination with original flow and brand assets"
          git push origin main
