name: Apply verified source package once

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'automation/rebuild-exact'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Replace repository with verified source package
        shell: bash
        run: |
          set -euo pipefail
          cp artifacts/final-site.tar.gz /tmp/final-site.tar.gz
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/final-site.tar.gz -C .
          mkdir -p public/images .github/workflows
          curl -fsSL https://raw.githubusercontent.com/Satte882/DPPFOR-Astro-Site/main/public/images/logo.png -o public/images/logo.png
          curl -fsSL https://raw.githubusercontent.com/Satte882/DPPFOR-Astro-Site/main/public/favicon.png -o public/favicon.png
          cat > .github/workflows/verify.yml <<'YAML'
          name: Verify website

          on:
            push:
              branches: [main]
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            verify:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22
                    cache: npm
                - run: npm ci
                - run: npm run lint
                - run: npm run build
          YAML

      - name: Commit final website to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize website combination with original flow and brand assets"
          git push origin main
