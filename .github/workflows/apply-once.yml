name: Apply verified website combination once

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'automation/rebuild-exact'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target main
        uses: actions/checkout@v4
        with:
          path: target
          ref: main
          fetch-depth: 0

      - name: Checkout Site 1 trunk
        uses: actions/checkout@v4
        with:
          repository: Satte882/DPPFOR-Astro-Site
          path: source1

      - name: Checkout Site 2 donor
        uses: actions/checkout@v4
        with:
          repository: Satte882/DPP_Blatt_Flow
          path: source2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Site 1 static pages
        working-directory: source1
        run: |
          npm ci
          npm run check
          npm run build

      - name: Assemble exact combination
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/combination-merge"
          cp -a target/merge/. "${RUNNER_TEMP}/combination-merge/"

          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='merge' \
            source2/ target/

          mkdir -p target/app target/components target/tests target/public
          cp "${RUNNER_TEMP}/combination-merge/page.tsx" target/app/page.tsx
          cp "${RUNNER_TEMP}/combination-merge/layout.tsx" target/app/layout.tsx
          cp "${RUNNER_TEMP}/combination-merge/site-one.css" target/app/site-one.css
          cp "${RUNNER_TEMP}/combination-merge/site-one-sections.tsx" target/components/site-one-sections.tsx
          cp "${RUNNER_TEMP}/combination-merge/faq-section.tsx" target/components/faq-section.tsx
          cp "${RUNNER_TEMP}/combination-merge/home.spec.ts" target/tests/home.spec.ts
          cp "${RUNNER_TEMP}/combination-merge/README.md" target/README.md

          rsync -a --exclude='/index.html' source1/dist/ target/public/

      - name: Install combined website
        working-directory: target
        run: npm ci

      - name: Lint combined website
        working-directory: target
        run: npm run lint

      - name: Build combined website
        working-directory: target
        run: npm run build

      - name: Install browser
        working-directory: target
        run: npx playwright install --with-deps chromium

      - name: Run browser regression tests
        working-directory: target
        run: npm test

      - name: Commit verified final website to main
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize website combination with original flow and brand assets"
          git push origin main
