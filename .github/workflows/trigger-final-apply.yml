name: Trigger final artifact application

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  actions: write
  contents: read

jobs:
  trigger:
    if: github.event.pull_request.number == 2
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch trusted apply workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run apply-once.yml --repo "${{ github.repository }}" --ref main
