name: Trigger final apply from issue

on:
  issue_comment:
    types: [created]

permissions:
  actions: write
  contents: read

jobs:
  trigger:
    if: github.event.issue.number == 3 && github.event.comment.body == 'apply verified artifact'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch trusted apply workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run apply-once.yml --repo "${{ github.repository }}" --ref main
