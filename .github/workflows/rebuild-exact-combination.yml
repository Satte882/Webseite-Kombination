name: Rebuild exact website combination

on:
  pull_request:
    branches: [main]
    types: [reopened, synchronize]

permissions:
  contents: read

jobs:
  rebuild:
    if: github.event.pull_request.head.ref == 'automation/rebuild-exact-2'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull-request merge state
        uses: actions/checkout@v4
        with:
          path: target
          fetch-depth: 0

      - name: Checkout Site 1 trunk
        uses: actions/checkout@v4
        with:
          repository: Satte882/DPPFOR-Astro-Site
          path: source1

      - name: Checkout Site 2 donor
        uses: actions/checkout@v4
        with:
          repository: Satte882/DPP_Blatt_Flow
          path: source2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Site 1 static pages
        working-directory: source1
        run: |
          npm ci
          npm run check
          npm run build

      - name: Assemble exact combination
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/combination-merge
          cp -a target/merge/. /tmp/combination-merge/

          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='merge' \
            source2/ target/

          mkdir -p target/app target/components target/tests target/public
          cp /tmp/combination-merge/page.tsx target/app/page.tsx
          cp /tmp/combination-merge/layout.tsx target/app/layout.tsx
          cp /tmp/combination-merge/site-one.css target/app/site-one.css
          cp /tmp/combination-merge/site-one-sections.tsx target/components/site-one-sections.tsx
          cp /tmp/combination-merge/faq-section.tsx target/components/faq-section.tsx
          cp /tmp/combination-merge/home.spec.ts target/tests/home.spec.ts
          cp /tmp/combination-merge/README.md target/README.md

          rsync -a --exclude='/index.html' source1/dist/ target/public/

      - name: Install combined website
        working-directory: target
        run: npm ci

      - name: Lint combined website
        working-directory: target
        run: npm run lint

      - name: Build combined website
        working-directory: target
        run: npm run build

      - name: Install browser for verification
        working-directory: target
        run: npx playwright install --with-deps chromium

      - name: Run browser regression tests
        id: tests
        continue-on-error: true
        working-directory: target
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.log

      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-diagnostics
          path: |
            target/test-output.log
            target/test-results
            target/playwright-report
          if-no-files-found: ignore
          retention-days: 1

      - name: Fail when browser tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

      - name: Prepare verified source artifact
        shell: bash
        run: |
          rm -rf target/.git target/.github target/merge target/node_modules target/.next target/out target/test-results target/playwright-report target/test-output.log

      - name: Upload verified combination
        uses: actions/upload-artifact@v4
        with:
          name: verified-website-combination
          path: target
          include-hidden-files: true
          retention-days: 1
